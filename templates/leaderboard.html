<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Leaderboard - Klaus Bot</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}?v=20">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💜</text></svg>">
</head>
<body>
  <div class="bg-glow"></div>

  <nav class="nav">
    <a href="/" class="nav-brand">
      <span class="brand-icon">💜</span>
      <span class="brand-text">KLAUS</span>
    </a>
    <div class="nav-links">
      <a href="/" class="nav-link">Home</a>
      <a href="/status" class="nav-link">Status</a>
      <a href="/leaderboard" class="nav-link">Leaderboard</a>
      <a href="/dashboard" class="btn btn-primary btn-sm">Dashboard</a>
    </div>
  </nav>

  <div class="container">
    <div class="section-header" style="margin-bottom: 2rem;">
      <span class="section-badge">Ranking</span>
      <h2>Leaderboard Global</h2>
      <p>Os jogadores mais ricos do Klaus</p>
    </div>

    <div id="podium" class="podium-section"></div>

    <div class="card" style="overflow: hidden; margin-top: 2rem;">
      <div style="padding: 1rem 1.5rem 0.5rem; border-bottom: 1px solid var(--border); display: flex; font-size: 0.75rem; color: var(--text3); text-transform: uppercase; letter-spacing: 0.05em;">
        <span style="width: 50px;">#</span>
        <span style="flex: 1;">Jogador</span>
        <span style="width: 80px; text-align: right;">Conquistas</span>
        <span style="width: 100px; text-align: right;">Koins</span>
      </div>
      <div id="leaderboard-list"></div>
    </div>

    <div id="pagination" style="display: flex; justify-content: center; gap: 0.5rem; margin-top: 1.5rem;"></div>

    <div id="loading" style="text-align: center; padding: 3rem; color: var(--text3);">Carregando...</div>

    <div id="profile-modal" class="modal" style="display:none;">
      <div class="modal-content card">
        <div style="text-align: center; padding: 1.5rem 1rem;">
          <img id="modal-avatar" src="" style="width: 88px; height: 88px; border-radius: 50%; border: 3px solid var(--primary); margin-bottom: 0.8rem; object-fit: cover;">
          <h3 id="modal-name" style="margin-bottom: 0.2rem;">--</h3>
          <p style="color: var(--text3); font-size: 0.8rem;" id="modal-id">ID: --</p>
        </div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 0.6rem; padding: 0 1rem 1rem;">
          <div class="modal-stat"><span>Koins</span><h4 id="modal-koins">0</h4></div>
          <div class="modal-stat"><span>Streak</span><h4 id="modal-streak">0 dias</h4></div>
          <div class="modal-stat"><span>Comandos</span><h4 id="modal-commands">0</h4></div>
          <div class="modal-stat"><span>Conquistas</span><h4 id="modal-achievements">0</h4></div>
        </div>
        <button class="btn btn-ghost" onclick="closeModal()" style="width: calc(100% - 2rem); margin: 0 1rem 1rem;">Fechar</button>
      </div>
    </div>
  </div>

  <style>
    .podium-section {
      display: flex;
      justify-content: center;
      align-items: flex-end;
      gap: 1.2rem;
      min-height: 200px;
      padding: 1rem 0;
    }
    .podium-item {
      text-align: center;
      cursor: pointer;
      transition: transform 0.3s;
    }
    .podium-item:hover { transform: translateY(-6px); }
    .podium-avatar-wrap {
      position: relative;
      margin-bottom: 0.6rem;
    }
    .podium-avatar {
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid var(--primary);
    }
    .podium-avatar.gold { width: 88px; height: 88px; border-color: #ffd700; box-shadow: 0 0 20px rgba(255,215,0,0.3); }
    .podium-avatar.silver { width: 72px; height: 72px; border-color: #c0c0c0; }
    .podium-avatar.bronze { width: 64px; height: 64px; border-color: #cd7f32; }
    .podium-medal {
      position: absolute;
      bottom: -4px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 1.2rem;
    }
    .podium-name { font-size: 0.85rem; font-weight: 700; margin-bottom: 0.15rem; }
    .podium-koins { font-size: 0.75rem; color: var(--primary-light); font-weight: 600; }
    .podium-bar {
      width: 110px;
      border-radius: 12px 12px 0 0;
      margin-top: 0.6rem;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding-bottom: 0.6rem;
      font-size: 1.4rem;
      font-weight: 900;
      transition: height 1s cubic-bezier(0.22, 1, 0.36, 1);
    }
    .podium-bar.gold { background: linear-gradient(180deg, rgba(255,215,0,0.25) 0%, rgba(255,215,0,0.05) 100%); height: 110px; color: #ffd700; }
    .podium-bar.silver { background: linear-gradient(180deg, rgba(192,192,192,0.2) 0%, rgba(192,192,192,0.05) 100%); height: 85px; color: #c0c0c0; }
    .podium-bar.bronze { background: linear-gradient(180deg, rgba(205,127,50,0.2) 0%, rgba(205,127,50,0.05) 100%); height: 65px; color: #cd7f32; }

    .lb-row {
      display: flex;
      align-items: center;
      padding: 0.7rem 1.5rem;
      border-bottom: 1px solid var(--border);
      transition: background 0.2s;
      cursor: pointer;
    }
    .lb-row:hover { background: rgba(139, 92, 246, 0.06); }
    .lb-row:last-child { border-bottom: none; }
    .lb-rank {
      width: 50px;
      font-size: 0.85rem;
      font-weight: 800;
      color: var(--text3);
      flex-shrink: 0;
    }
    .lb-rank.top3 { color: var(--primary-light); font-size: 1rem; }
    .lb-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      margin-right: 0.8rem;
      flex-shrink: 0;
      object-fit: cover;
    }
    .lb-info { flex: 1; }
    .lb-info h4 { font-size: 0.9rem; font-weight: 600; margin: 0; }
    .lb-info p { font-size: 0.73rem; color: var(--text3); margin: 0.1rem 0 0; }
    .lb-achievements {
      width: 80px;
      text-align: right;
      font-size: 0.85rem;
      color: var(--text3);
    }
    .lb-koins {
      width: 100px;
      text-align: right;
      font-weight: 800;
      color: var(--primary-light);
      font-size: 0.9rem;
    }

    .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(10px); display: flex; align-items: center; justify-content: center; z-index: 200; padding: 2rem; }
    .modal-content { max-width: 380px; width: 100%; animation: fadeIn 0.3s ease; }
    .modal-stat { text-align: center; padding: 0.6rem; background: rgba(15, 10, 26, 0.5); border-radius: 10px; }
    .modal-stat span { color: var(--text3); font-size: 0.73rem; display: block; }
    .modal-stat h4 { font-size: 1rem; margin: 0.2rem 0 0; color: var(--primary-light); }

    .page-btn {
      width: 36px; height: 36px; border-radius: 8px; border: 1px solid var(--border2);
      background: transparent; color: var(--text2); cursor: pointer; font-weight: 600;
      font-family: inherit; transition: all 0.2s;
    }
    .page-btn:hover { border-color: var(--primary); color: var(--primary-light); }
    .page-btn.active { background: var(--primary); color: white; border-color: transparent; }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  </style>

  <script>
    let currentPage = 1;

    function formatKoins(n) {
      if (n >= 1000000) return (n / 1000000).toFixed(1) + 'M';
      if (n >= 1000) return (n / 1000).toFixed(1) + 'K';
      return n.toString();
    }

    function loadPage(page) {
      currentPage = page;
      document.getElementById('loading').style.display = 'block';
      document.getElementById('leaderboard-list').innerHTML = '';

      fetch(`/api/leaderboard_full?page=${page}`).then(r => r.json()).then(data => {
        document.getElementById('loading').style.display = 'none';
        const entries = data.entries || [];

        if (page === 1 && entries.length >= 3) {
          renderPodium(entries.slice(0, 3));
        } else if (page === 1) {
          document.getElementById('podium').innerHTML = '';
        }

        const list = document.getElementById('leaderboard-list');
        entries.forEach((e) => {
          const rank = e.rank;
          const isTop3 = rank <= 3;
          const row = document.createElement('div');
          row.className = 'lb-row';
          row.onclick = () => openProfile(e);
          row.innerHTML = `
            <span class="lb-rank ${isTop3 ? 'top3' : ''}">${rank <= 3 ? ['🥇','🥈','🥉'][rank-1] : '#' + rank}</span>
            <img class="lb-avatar" src="${e.avatar_url}" onerror="this.src='https://cdn.discordapp.com/embed/avatars/0.png'" alt="">
            <div class="lb-info">
              <h4>${e.username}</h4>
              <p>Streak: ${e.daily_streak || 0} dias · ${(e.commands_used || 0).toLocaleString('pt-BR')} cmds</p>
            </div>
            <div class="lb-achievements">🏆 ${e.achievements || 0}</div>
            <div class="lb-koins">${formatKoins(e.koins)} 💰</div>
          `;
          list.appendChild(row);
        });

        renderPagination(data.page, data.pages);
      }).catch(() => {
        document.getElementById('loading').textContent = 'Erro ao carregar leaderboard';
      });
    }

    function renderPodium(top3) {
      const podium = document.getElementById('podium');
      podium.innerHTML = '';
      const medals = ['silver', 'gold', 'bronze'];
      const order = [1, 0, 2];
      const medalEmoji = ['🥈', '🥇', '🥉'];

      order.forEach((idx, pos) => {
        const e = top3[idx];
        if (!e) return;
        const div = document.createElement('div');
        div.className = 'podium-item';
        div.style.animationDelay = (pos * 0.15) + 's';
        div.onclick = () => openProfile(e);
        div.innerHTML = `
          <div class="podium-avatar-wrap">
            <img class="podium-avatar ${medals[pos]}" src="${e.avatar_url}" onerror="this.src='https://cdn.discordapp.com/embed/avatars/0.png'" alt="">
            <div class="podium-medal">${medalEmoji[pos]}</div>
          </div>
          <div class="podium-name">${e.username}</div>
          <div class="podium-koins">${formatKoins(e.koins)} 💰</div>
          <div class="podium-bar ${medals[pos]}">${['2','1','3'][pos]}</div>
        `;
        podium.appendChild(div);
      });
    }

    function renderPagination(current, total) {
      const pag = document.getElementById('pagination');
      pag.innerHTML = '';
      if (total <= 1) return;
      for (let i = 1; i <= Math.min(total, 10); i++) {
        const btn = document.createElement('button');
        btn.className = `page-btn ${i === current ? 'active' : ''}`;
        btn.textContent = i;
        btn.onclick = () => loadPage(i);
        pag.appendChild(btn);
      }
    }

    function openProfile(entry) {
      const modal = document.getElementById('profile-modal');
      document.getElementById('modal-avatar').src = entry.avatar_url;
      document.getElementById('modal-name').textContent = entry.username;
      document.getElementById('modal-id').textContent = `ID: ${entry.discord_id}`;
      document.getElementById('modal-koins').textContent = formatKoins(entry.koins);
      document.getElementById('modal-streak').textContent = `${entry.daily_streak || 0} dias`;
      document.getElementById('modal-commands').textContent = (entry.commands_used || 0).toLocaleString('pt-BR');
      document.getElementById('modal-achievements').textContent = entry.achievements || 0;
      modal.style.display = 'flex';
    }

    function closeModal() {
      document.getElementById('profile-modal').style.display = 'none';
    }

    document.getElementById('profile-modal').onclick = function(e) {
      if (e.target === this) closeModal();
    };

    loadPage(1);
  </script>
</body>
</html>
