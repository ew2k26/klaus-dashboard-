<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Perfil - Klaus Bot</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}?v=32">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💜</text></svg>">
</head>
<body>
  <div class="bg-glow"></div>

  <nav class="nav">
    <a href="/" class="nav-brand">
      <span class="brand-icon">💜</span>
      <span class="brand-text">KLAUS</span>
    </a>
    <div class="nav-links">
      <a href="/" class="nav-link">Home</a>
      <a href="/status" class="nav-link">Status</a>
      <a href="/leaderboard" class="nav-link">Leaderboard</a>
      <a href="/profile" class="nav-link">Perfil</a>
      <a href="/dashboard" class="btn btn-primary btn-sm">Dashboard</a>
    </div>
  </nav>

  <div class="container">
    <!-- PILLOW IMAGE -->
    <div class="profile-hero">
      <div class="pf-image-wrap" id="pf-image-wrap">
        <img id="pf-image" src="" alt="Profile" class="pf-image" style="display:none">
        <div id="pf-loading" class="pf-loading">
          <div class="spinner"></div>
          <span>Carregando...</span>
        </div>
        <div id="pf-no-image" class="pf-no-image" style="display:none">
          <span style="font-size:3rem;opacity:0.3">👤</span>
          <p>Use <code>/perfil</code> no Discord para gerar seu perfil</p>
        </div>
      </div>
      <div class="pf-hero-actions">
        <button class="btn btn-primary" onclick="document.getElementById('shop-section').scrollIntoView({behavior:'smooth'})">
          Editar Perfil
        </button>
        <span id="koins-badge" class="badge badge-gold">0 Koins</span>
      </div>
    </div>

    <!-- SHOP -->
    <div id="shop-section">
      <div class="section-header" style="margin-bottom:1.5rem">
        <h2>Loja de Perfil</h2>
        <p>Compre fundos e bordas exclusivas com seus koins</p>
      </div>

      <div class="card shop-section">
        <div class="shop-section-header">
          <h3>Fundos</h3>
          <span class="shop-count" id="bg-count">0/15</span>
        </div>
        <div id="custom-bg-section" style="margin-bottom:1rem"></div>
        <div class="shop-grid" id="bg-grid"></div>
      </div>

      <div class="card shop-section" style="margin-top:1.5rem">
        <div class="shop-section-header">
          <h3>Bordas</h3>
          <span class="shop-count" id="border-count">0/12</span>
        </div>
        <div class="shop-grid" id="border-grid"></div>
      </div>

    </div>
  </div>

  <div id="alert-box"></div>
  <div id="upload-modal"></div>

  <style>
    .pf-hero-actions { display:flex; align-items:center; justify-content:center; gap:1rem; margin-top:1rem; }

    .pf-image-wrap {
      position:relative; max-width:600px; margin:0 auto; border-radius:16px; overflow:hidden;
      box-shadow:0 8px 40px rgba(0,0,0,0.4), 0 0 60px rgba(139,92,246,0.1);
      border:1px solid rgba(139,92,246,0.15); background:rgba(10,7,20,0.8);
      min-height:180px; display:flex; align-items:center; justify-content:center;
    }
    .pf-image { width:100%; height:auto; display:block; }
    .pf-loading { display:flex; flex-direction:column; align-items:center; gap:0.8rem; padding:2rem; color:var(--text3); }
    .pf-no-image { display:flex; flex-direction:column; align-items:center; gap:0.5rem; padding:2rem; color:var(--text3); }
    .pf-no-image code { background:rgba(139,92,246,0.15); padding:2px 8px; border-radius:4px; color:var(--primary-light); font-size:0.85rem; }
    .spinner { width:32px; height:32px; border:3px solid rgba(139,92,246,0.2); border-top-color:var(--primary); border-radius:50%; animation:spin 0.8s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }

    .shop-section-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:1rem; }
    .shop-section-header h3 { margin:0; }
    .shop-count { font-size:0.8rem; color:var(--text3); }
    .shop-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(170px,1fr)); gap:0.8rem; }
    .shop-card { background:rgba(10,7,20,0.6); border:1px solid var(--border2); border-radius:14px; cursor:pointer; transition:all 0.3s; overflow:hidden; }
    .shop-card:hover { border-color:var(--primary); transform:translateY(-3px); box-shadow:0 8px 25px rgba(0,0,0,0.3); }
    .shop-card.owned { border-color:rgba(34,197,94,0.3); }
    .shop-card.active { border-color:var(--primary); box-shadow:0 0 20px rgba(139,92,246,0.15); }
    .sc-preview { height:48px; position:relative; overflow:hidden; }
    .sc-accent { position:absolute; inset:0; opacity:0.35; }
    .sc-border-circle { width:36px; height:36px; border-radius:50%; border:3px solid; margin:6px auto; }
    .sc-info { padding:6px 10px 4px; display:flex; align-items:center; gap:5px; }
    .sc-emoji { font-size:1rem; }
    .sc-name { font-size:0.78rem; font-weight:600; flex:1; }
    .sc-price { font-size:0.68rem; color:var(--primary-light); font-weight:600; }
    .sc-actions { padding:2px 10px 8px; display:flex; gap:4px; }
    .sc-btn { flex:1; padding:5px 0; border-radius:6px; border:none; font-size:0.68rem; font-weight:600; cursor:pointer; transition:all 0.2s; font-family:inherit; }
    .sc-btn-equip { background:var(--primary); color:white; }
    .sc-btn-equip:hover { background:var(--primary-dark); }
    .sc-btn-buy { background:rgba(255,215,0,0.15); color:#ffd700; border:1px solid rgba(255,215,0,0.2); }
    .sc-btn-buy:hover { background:rgba(255,215,0,0.25); }
    .sc-btn-active { background:rgba(34,197,94,0.15); color:#4ade80; cursor:default; }
    .shop-save-bar { text-align:center; margin-top:1.5rem; padding-top:1rem; border-top:1px solid var(--border); }
    .save-status { font-size:0.75rem; color:#4ade80; margin-top:0.5rem; min-height:1.2rem; transition:opacity 0.3s; }

    .confirm-overlay {
      position:fixed; inset:0; background:rgba(0,0,0,0.7); backdrop-filter:blur(8px);
      display:flex; align-items:center; justify-content:center; z-index:9999;
      opacity:0; transition:opacity 0.3s;
    }
    .confirm-overlay.open { opacity:1; }
    .confirm-modal {
      background:linear-gradient(135deg,#13101f 0%,#1a1030 100%);
      border:1px solid rgba(139,92,246,0.3); border-radius:20px;
      padding:2.5rem 2rem; text-align:center; max-width:380px; width:90%;
      box-shadow:0 20px 60px rgba(0,0,0,0.5), 0 0 40px rgba(139,92,246,0.15);
      transform:scale(0.8); transition:transform 0.3s;
    }
    .confirm-overlay.open .confirm-modal { transform:scale(1); }
    .confirm-emoji { font-size:3.5rem; margin-bottom:0.8rem; filter:drop-shadow(0 4px 12px rgba(139,92,246,0.3)); }
    .confirm-title { font-size:1.3rem; font-weight:800; color:white; margin-bottom:0.5rem; }
    .confirm-msg { font-size:0.85rem; color:var(--text3); line-height:1.5; margin-bottom:1.8rem; }
    .confirm-msg b { color:var(--primary-light); }
    .confirm-actions { display:flex; gap:0.8rem; }
    .confirm-btn {
      flex:1; padding:0.7rem 0; border-radius:10px; border:none; font-size:0.85rem;
      font-weight:700; cursor:pointer; transition:all 0.2s; font-family:inherit;
    }
    .confirm-cancel {
      background:rgba(255,255,255,0.06); color:var(--text3); border:1px solid var(--border2);
    }
    .confirm-cancel:hover { background:rgba(255,255,255,0.1); color:white; }
    .confirm-ok {
      background:linear-gradient(135deg,var(--primary),var(--pink)); color:white;
      box-shadow:0 4px 20px rgba(139,92,246,0.3);
    }
    .confirm-ok:hover { transform:translateY(-2px); box-shadow:0 6px 25px rgba(139,92,246,0.4); }

    .custom-bg-card {
      display:flex; align-items:center; gap:1rem; padding:1rem 1.2rem;
      background:linear-gradient(135deg, rgba(139,92,246,0.08) 0%, rgba(217,70,239,0.06) 100%);
      border:1px dashed rgba(139,92,246,0.3); border-radius:12px; cursor:pointer;
      transition:all 0.3s; position:relative; overflow:hidden;
    }
    .custom-bg-card:hover { border-color:var(--primary); background:rgba(139,92,246,0.12); }
    .custom-bg-card.has-custom { border-style:solid; border-color:rgba(34,197,94,0.4); }
    .custom-bg-icon { width:48px; height:48px; border-radius:10px; display:flex; align-items:center; justify-content:center;
      background:linear-gradient(135deg,var(--primary),var(--pink)); font-size:1.5rem; flex-shrink:0; }
    .custom-bg-info { flex:1; }
    .custom-bg-info h4 { margin:0; font-size:0.9rem; color:white; }
    .custom-bg-info p { margin:0; font-size:0.75rem; color:var(--text3); }
    .custom-bg-actions { display:flex; gap:0.5rem; }
    .custom-bg-btn { padding:6px 14px; border-radius:8px; border:none; font-size:0.75rem; font-weight:600; cursor:pointer; transition:all 0.2s; font-family:inherit; }
    .custom-bg-btn-upload { background:var(--primary); color:white; }
    .custom-bg-btn-upload:hover { background:var(--primary-dark); }
    .custom-bg-btn-remove { background:rgba(239,68,68,0.15); color:#ef4444; border:1px solid rgba(239,68,68,0.2); }
    .custom-bg-btn-remove:hover { background:rgba(239,68,68,0.25); }

    .upload-overlay {
      position:fixed; inset:0; background:rgba(0,0,0,0.7); backdrop-filter:blur(8px);
      display:flex; align-items:center; justify-content:center; z-index:9999;
      opacity:0; transition:opacity 0.3s;
    }
    .upload-overlay.open { opacity:1; }
    .upload-modal {
      background:linear-gradient(135deg,#13101f 0%,#1a1030 100%);
      border:1px solid rgba(139,92,246,0.3); border-radius:20px;
      padding:2rem; max-width:480px; width:90%;
      box-shadow:0 20px 60px rgba(0,0,0,0.5), 0 0 40px rgba(139,92,246,0.15);
      transform:scale(0.8); transition:transform 0.3s; text-align:center;
    }
    .upload-overlay.open .upload-modal { transform:scale(1); }
    .upload-dropzone {
      border:2px dashed rgba(139,92,246,0.3); border-radius:14px; padding:2rem 1rem;
      margin:1rem 0; cursor:pointer; transition:all 0.3s; position:relative;
    }
    .upload-dropzone:hover, .upload-dropzone.dragover { border-color:var(--primary); background:rgba(139,92,246,0.06); }
    .upload-dropzone-icon { font-size:2.5rem; margin-bottom:0.5rem; }
    .upload-dropzone p { color:var(--text3); font-size:0.85rem; margin:0; }
    .upload-dropzone small { color:var(--text3); font-size:0.7rem; opacity:0.6; }
    .upload-dropzone input { position:absolute; inset:0; opacity:0; cursor:pointer; }
    .upload-preview { max-width:100%; max-height:120px; border-radius:8px; margin-top:0.8rem; display:none; }
    .upload-url-input {
      width:100%; padding:0.6rem 1rem; border-radius:10px; border:1px solid var(--border2);
      background:rgba(10,7,20,0.6); color:white; font-size:0.85rem; font-family:inherit;
      margin-top:0.8rem; outline:none; transition:border-color 0.3s;
    }
    .upload-url-input:focus { border-color:var(--primary); }
    .upload-url-input::placeholder { color:var(--text3); opacity:0.5; }
    .upload-cost { font-size:0.8rem; color:#ffd700; margin:0.8rem 0; font-weight:600; }
    .upload-actions { display:flex; gap:0.8rem; margin-top:1rem; }
    .upload-btn { flex:1; padding:0.7rem 0; border-radius:10px; border:none; font-size:0.85rem; font-weight:700; cursor:pointer; font-family:inherit; transition:all 0.2s; }
    .upload-btn-cancel { background:rgba(255,255,255,0.06); color:var(--text3); border:1px solid var(--border2); }
    .upload-btn-cancel:hover { background:rgba(255,255,255,0.1); color:white; }
    .upload-btn-confirm { background:linear-gradient(135deg,var(--primary),var(--pink)); color:white; box-shadow:0 4px 20px rgba(139,92,246,0.3); }
    .upload-btn-confirm:hover { transform:translateY(-2px); }
    .upload-btn-confirm:disabled { opacity:0.5; cursor:not-allowed; transform:none; }
  </style>

  <script>
    const USER_ID = "{{ user.id }}";
    const BGS = {{ backgrounds | tojson }};
    const BORDERS = {{ borders | tojson }};

    let profile = {};
    let activeBg = "padrao";
    let activeBorder = "default";

    function fmt(n) {
      if (n >= 1e18) return (n/1e18).toFixed(1)+'Qi';
      if (n >= 1e15) return (n/1e15).toFixed(1)+'Q';
      if (n >= 1e12) return (n/1e12).toFixed(1)+'T';
      if (n >= 1e9) return (n/1e9).toFixed(1)+'B';
      if (n >= 1e6) return (n/1e6).toFixed(1)+'M';
      if (n >= 1e3) return (n/1e3).toFixed(1)+'K';
      return n.toLocaleString('pt-BR');
    }

    function showConfirm(title, msg, emoji) {
      return new Promise((resolve) => {
        const overlay = document.createElement('div');
        overlay.className = 'confirm-overlay';
        overlay.innerHTML = `
          <div class="confirm-modal">
            <div class="confirm-emoji">${emoji || '💜'}</div>
            <div class="confirm-title">${title}</div>
            <div class="confirm-msg">${msg}</div>
            <div class="confirm-actions">
              <button class="confirm-btn confirm-cancel">Cancelar</button>
              <button class="confirm-btn confirm-ok">Confirmar</button>
            </div>
          </div>`;
        document.body.appendChild(overlay);
        requestAnimationFrame(() => overlay.classList.add('open'));
        overlay.querySelector('.confirm-cancel').onclick = () => { overlay.classList.remove('open'); setTimeout(() => overlay.remove(), 300); resolve(false); };
        overlay.querySelector('.confirm-ok').onclick = () => { overlay.classList.remove('open'); setTimeout(() => overlay.remove(), 300); resolve(true); };
        overlay.onclick = (e) => { if (e.target === overlay) { overlay.classList.remove('open'); setTimeout(() => overlay.remove(), 300); resolve(false); } };
      });
    }

    function loadProfileImage() {
      const img = document.getElementById('pf-image');
      const loading = document.getElementById('pf-loading');
      const noImg = document.getElementById('pf-no-image');
      img.onload = function() { loading.style.display='none'; noImg.style.display='none'; img.style.display='block'; };
      img.onerror = function() { loading.style.display='none'; noImg.style.display='flex'; img.style.display='none'; };
      img.src = `/api/profile_image/${USER_ID}?t=${Date.now()}`;
    }

    function renderCustomBg() {
      const section = document.getElementById('custom-bg-section');
      if (!section) return;
      const hasCustom = profile.has_custom_bg;
      const url = profile.custom_bg_url;
      section.innerHTML = `
        <div class="custom-bg-card ${hasCustom?'has-custom':''}" onclick="openUploadModal()">
          <div class="custom-bg-icon">${hasCustom?'🖼️':'+'}</div>
          <div class="custom-bg-info">
            <h4>${hasCustom?'Imagem Custom':'Imagem Customizada'}</h4>
            <p>${hasCustom?'Sua imagem personalizada esta ativa':'Envie uma URL de imagem por 1M koins'}</p>
          </div>
          <div class="custom-bg-actions">
            ${hasCustom?`<button class="custom-bg-btn custom-bg-btn-upload" onclick="event.stopPropagation();openUploadModal()">Trocar</button>
              <button class="custom-bg-btn custom-bg-btn-remove" onclick="event.stopPropagation();removeCustomBg()">Remover</button>`
              :`<button class="custom-bg-btn custom-bg-btn-upload">Comprar</button>`}
          </div>
        </div>`;
    }

    function openUploadModal() {
      const modal = document.getElementById('upload-modal');
      const hasCustom = profile.has_custom_bg;
      modal.innerHTML = `
        <div class="upload-overlay" id="upload-overlay">
          <div class="upload-modal">
            <div style="font-size:2rem;margin-bottom:0.3rem">🖼️</div>
            <h3 style="margin:0 0 0.3rem;color:white">${hasCustom?'Trocar Imagem':'Imagem Customizada'}</h3>
            <p style="font-size:0.8rem;color:var(--text3);margin:0">
              ${hasCustom?'Envie uma nova URL de imagem':'Envie uma URL de imagem para usar como fundo do perfil'}
            </p>
            <div class="upload-dropzone" id="upload-dropzone">
              <div class="upload-dropzone-icon">📷</div>
              <p>Cole uma URL de imagem aqui</p>
              <small>PNG, JPG ou GIF</small>
              <input type="text" id="upload-url-input" class="upload-url-input" placeholder="https://exemplo.com/minha-imagem.png"
                oninput="previewUploadUrl(this.value)">
            </div>
            <img id="upload-preview" class="upload-preview" src="" alt="Preview">
            ${!hasCustom?'<div class="upload-cost">Custo: 1.000.000 Koins</div>':''}
            <div class="upload-actions">
              <button class="upload-btn upload-btn-cancel" onclick="closeUploadModal()">Cancelar</button>
              <button class="upload-btn upload-btn-confirm" id="upload-confirm-btn" onclick="confirmUpload()" ${hasCustom?'':'disabled'}>
                ${hasCustom?'Salvar':'Comprar & Salvar'}
              </button>
            </div>
          </div>
        </div>`;
      requestAnimationFrame(() => modal.querySelector('.upload-overlay').classList.add('open'));
      setTimeout(() => {
        const input = document.getElementById('upload-url-input');
        if (input) input.focus();
      }, 400);
    }

    function previewUploadUrl(url) {
      const preview = document.getElementById('upload-preview');
      const btn = document.getElementById('upload-confirm-btn');
      if (!preview || !btn) return;
      if (url && (url.startsWith('http://') || url.startsWith('https://'))) {
        preview.src = url;
        preview.onload = () => { preview.style.display='block'; btn.disabled=false; };
        preview.onerror = () => { preview.style.display='none'; btn.disabled=true; };
      } else {
        preview.style.display='none';
        btn.disabled=true;
      }
    }

    function closeUploadModal() {
      const overlay = document.getElementById('upload-overlay');
      if (overlay) { overlay.classList.remove('open'); setTimeout(() => overlay.remove(), 300); }
    }

    async function confirmUpload() {
      const input = document.getElementById('upload-url-input');
      const url = input ? input.value.trim() : '';
      if (!url) return;
      const btn = document.getElementById('upload-confirm-btn');
      btn.disabled = true; btn.textContent = 'Salvando...';
      try {
        const r = await fetch('/api/profile_custom_bg', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({ user_id: USER_ID, image_url: url }),
        });
        const data = await r.json();
        if (data.ok) {
          profile.has_custom_bg = true;
          profile.custom_bg_url = url;
          if (data.new_koins !== undefined) profile.koins = data.new_koins;
          document.getElementById('koins-badge').textContent = fmt(profile.koins) + ' Koins';
          closeUploadModal();
          renderCustomBg();
          showAlert('Imagem customizada salva!', 'success');
        } else {
          showAlert(data.error || 'Erro ao salvar', 'error');
          btn.disabled = false; btn.textContent = 'Comprar & Salvar';
        }
      } catch(e) {
        showAlert('Erro de conexao', 'error');
        btn.disabled = false; btn.textContent = 'Comprar & Salvar';
      }
    }

    async function removeCustomBg() {
      const confirmed = await showConfirm('Remover imagem', 'Tem certeza que quer remover sua imagem customizada?', '🗑️');
      if (!confirmed) return;
      try {
        const r = await fetch('/api/profile_custom_bg/delete', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({ user_id: USER_ID }),
        });
        const data = await r.json();
        if (data.ok) {
          profile.has_custom_bg = false;
          profile.custom_bg_url = '';
          renderCustomBg();
          showAlert('Imagem removida', 'success');
        }
      } catch(e) {
        showAlert('Erro ao remover', 'error');
      }
    }

    function renderShop() {
      const ownedBg = profile.purchased_backgrounds || ["padrao"];
      const ownedBorder = profile.purchased_borders || ["default"];
      let bgOwned = 0, borderOwned = 0;

      const bgGrid = document.getElementById('bg-grid');
      bgGrid.innerHTML = '';
      for (const [key, bg] of Object.entries(BGS)) {
        const owned = ownedBg.includes(key);
        const active = key === activeBg;
        if (owned) bgOwned++;
        const card = document.createElement('div');
        card.className = `shop-card ${owned?'owned':''} ${active?'active':''}`;
        card.innerHTML = `
          <div class="sc-preview" style="background:${bg.colors.bg}"><div class="sc-accent" style="background:${bg.colors.accent}"></div></div>
          <div class="sc-info"><span class="sc-emoji">${bg.emoji}</span><span class="sc-name">${bg.name}</span><span class="sc-price">${bg.price===0?'Gratis':fmt(bg.price)+' K'}</span></div>
          <div class="sc-actions">
            ${active?'<button class="sc-btn sc-btn-active">Ativo</button>':
              owned?`<button class="sc-btn sc-btn-equip" onclick="equipBg('${key}')">Equipar</button>`:
              `<button class="sc-btn sc-btn-buy" onclick="buyItem('backgrounds','${key}',${bg.price},'${bg.name}','${bg.emoji}')">Comprar</button>`}
          </div>`;
        bgGrid.appendChild(card);
      }
      document.getElementById('bg-count').textContent = `${bgOwned}/${Object.keys(BGS).length}`;

      const borderGrid = document.getElementById('border-grid');
      borderGrid.innerHTML = '';
      for (const [key, b] of Object.entries(BORDERS)) {
        const owned = ownedBorder.includes(key);
        const active = key === activeBorder;
        if (owned) borderOwned++;
        const card = document.createElement('div');
        card.className = `shop-card ${owned?'owned':''} ${active?'active':''}`;
        card.innerHTML = `
          <div class="sc-preview" style="background:#0a0a14"><div class="sc-border-circle" style="border-color:${b.color}"></div></div>
          <div class="sc-info"><span class="sc-emoji">${b.emoji}</span><span class="sc-name">${b.name}</span><span class="sc-price">${b.price===0?'Gratis':fmt(b.price)+' K'}</span></div>
          <div class="sc-actions">
            ${active?'<button class="sc-btn sc-btn-active">Ativo</button>':
              owned?`<button class="sc-btn sc-btn-equip" onclick="equipBorder('${key}')">Equipar</button>`:
              `<button class="sc-btn sc-btn-buy" onclick="buyItem('borders','${key}',${b.price},'${b.name}','${b.emoji}')">Comprar</button>`}
          </div>`;
        borderGrid.appendChild(card);
      }
      document.getElementById('border-count').textContent = `${borderOwned}/${Object.keys(BORDERS).length}`;
    }

    async function autoSave() {
      try {
        await fetch(`/api/profile_config/${USER_ID}/set`, {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({ background: activeBg, border: activeBorder }),
        });
      } catch(e) {}
    }

    function equipBg(key) {
      activeBg = key;
      renderShop();
      autoSave();
    }

    function equipBorder(key) {
      activeBorder = key;
      renderShop();
      autoSave();
    }

    async function buyItem(type, key, price, name, emoji) {
      const itemType = type === 'backgrounds' ? 'fundo' : 'borda';
      const confirmed = await showConfirm(
        `${emoji} ${name}`,
        `Voce tem certeza que quer comprar este ${itemType} por <b>${fmt(price)} koins</b>?`,
        emoji
      );
      if (!confirmed) return;
      try {
        const r = await fetch('/api/profile_buy', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({ user_id: USER_ID, type, key }),
        });
        const data = await r.json();
        if (data.ok) {
          profile.koins = data.new_koins;
          if (type === 'backgrounds') {
            profile.purchased_backgrounds = profile.purchased_backgrounds || [];
            profile.purchased_backgrounds.push(key);
            activeBg = key;
          } else {
            profile.purchased_borders = profile.purchased_borders || [];
            profile.purchased_borders.push(key);
            activeBorder = key;
          }
          document.getElementById('koins-badge').textContent = fmt(profile.koins) + ' Koins';
          renderShop();
          autoSave();
          showAlert('Comprou e equipou!', 'success');
        } else {
          showAlert(data.error || 'Erro ao comprar', 'error');
        }
      } catch (e) {
        showAlert('Erro de conexao', 'error');
      }
    }

    function showAlert(msg, type) {
      const box = document.getElementById('alert-box');
      const d = document.createElement('div');
      d.className = `alert alert-${type}`; d.textContent = msg;
      box.appendChild(d); setTimeout(() => d.remove(), 3000);
    }

    fetch(`/api/profile_config/${USER_ID}`).then(r => r.json()).then(data => {
      profile = data;
      activeBg = data.background || 'padrao';
      activeBorder = data.border || 'default';
      document.getElementById('koins-badge').textContent = fmt(data.koins) + ' Koins';
      renderShop();
      renderCustomBg();
      loadProfileImage();
    });
  </script>
</body>
</html>
