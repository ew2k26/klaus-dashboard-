<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Perfil - Klaus Bot</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}?v=31">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💜</text></svg>">
</head>
<body>
  <div class="bg-glow"></div>

  <nav class="nav">
    <a href="/" class="nav-brand">
      <span class="brand-icon">💜</span>
      <span class="brand-text">KLAUS</span>
    </a>
    <div class="nav-links">
      <a href="/" class="nav-link">Home</a>
      <a href="/status" class="nav-link">Status</a>
      <a href="/leaderboard" class="nav-link">Leaderboard</a>
      <a href="/profile" class="nav-link">Perfil</a>
      <a href="/dashboard" class="btn btn-primary btn-sm">Dashboard</a>
    </div>
  </nav>

  <div class="container">
    <!-- PROFILE IMAGE -->
    <div class="profile-hero" id="profile-hero">
      <div class="pf-image-wrap" id="pf-image-wrap">
        <img id="pf-image" src="" alt="Profile" class="pf-image">
        <div class="pf-loading" id="pf-loading">
          <div class="spinner"></div>
          <span>Gerando perfil...</span>
        </div>
        <div class="pf-no-image" id="pf-no-image" style="display:none">
          <span style="font-size:3rem;opacity:0.3">👤</span>
          <p>Use <code>/perfil</code> no Discord para gerar seu perfil</p>
        </div>
      </div>
      <div class="pf-hero-actions">
        <button class="btn btn-primary" onclick="document.getElementById('shop-section').scrollIntoView({behavior:'smooth'})">
          Editar Perfil
        </button>
        <span id="koins-badge" class="badge badge-gold">0 Koins</span>
      </div>
    </div>

    <!-- SHOP -->
    <div id="shop-section">
      <div class="section-header" style="margin-bottom: 1.5rem;">
        <h2>Loja de Perfil</h2>
        <p>Compre fundos e bordas exclusivas com seus koins</p>
      </div>

      <div class="shop-layout">
        <div class="shop-col-full">
          <div class="card shop-section">
            <div class="shop-section-header">
              <h3>Fundos</h3>
              <span class="shop-count" id="bg-count">0/15</span>
            </div>
            <div class="shop-grid" id="bg-grid"></div>
          </div>

          <div class="card shop-section" style="margin-top: 1.5rem;">
            <div class="shop-section-header">
              <h3>Bordas</h3>
              <span class="shop-count" id="border-count">0/12</span>
            </div>
            <div class="shop-grid" id="border-grid"></div>
          </div>

          <div class="shop-save-bar">
            <button class="btn btn-primary" onclick="saveAll()" id="save-btn">Salvar Alteracoes</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="alert-box"></div>

  <style>
    .profile-hero {
      text-align: center;
      margin-bottom: 2.5rem;
      padding: 2rem 0 1rem;
    }
    .pf-image-wrap {
      position: relative;
      max-width: 600px;
      margin: 0 auto 1.5rem;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 8px 40px rgba(0,0,0,0.4), 0 0 60px rgba(139,92,246,0.1);
      border: 1px solid rgba(139,92,246,0.15);
      background: rgba(10,7,20,0.8);
      min-height: 200px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .pf-image {
      width: 100%;
      height: auto;
      display: block;
    }
    .pf-loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.8rem;
      padding: 2rem;
      color: var(--text3);
    }
    .pf-no-image {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      padding: 2rem;
      color: var(--text3);
    }
    .pf-no-image code {
      background: rgba(139,92,246,0.15);
      padding: 2px 8px;
      border-radius: 4px;
      color: var(--primary-light);
      font-size: 0.85rem;
    }
    .pf-hero-actions {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1rem;
    }
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid rgba(139,92,246,0.2);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .shop-layout {
      display: block;
    }
    .shop-section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1rem;
    }
    .shop-section-header h3 { margin: 0; }
    .shop-count { font-size: 0.8rem; color: var(--text3); }

    .shop-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
      gap: 0.8rem;
    }
    .shop-card {
      background: rgba(10, 7, 20, 0.6);
      border: 1px solid var(--border2);
      border-radius: 14px;
      cursor: pointer;
      transition: all 0.3s;
      overflow: hidden;
    }
    .shop-card:hover {
      border-color: var(--primary);
      transform: translateY(-3px);
      box-shadow: 0 8px 25px rgba(0,0,0,0.3);
    }
    .shop-card.owned { border-color: rgba(34,197,94,0.3); }
    .shop-card.active { border-color: var(--primary); box-shadow: 0 0 20px rgba(139,92,246,0.15); }

    .sc-preview { height: 48px; position: relative; overflow: hidden; }
    .sc-accent { position: absolute; inset: 0; opacity: 0.35; }
    .sc-border-circle {
      width: 36px; height: 36px; border-radius: 50%;
      border: 3px solid; margin: 6px auto;
    }
    .sc-info { padding: 6px 10px 4px; display: flex; align-items: center; gap: 5px; }
    .sc-emoji { font-size: 1rem; }
    .sc-name { font-size: 0.78rem; font-weight: 600; flex: 1; }
    .sc-price { font-size: 0.68rem; color: var(--primary-light); font-weight: 600; }
    .sc-actions { padding: 2px 10px 8px; display: flex; gap: 4px; }
    .sc-btn {
      flex: 1; padding: 5px 0; border-radius: 6px; border: none;
      font-size: 0.68rem; font-weight: 600; cursor: pointer;
      transition: all 0.2s; font-family: inherit;
    }
    .sc-btn-equip { background: var(--primary); color: white; }
    .sc-btn-equip:hover { background: var(--primary-dark); }
    .sc-btn-buy {
      background: rgba(255,215,0,0.15); color: #ffd700;
      border: 1px solid rgba(255,215,0,0.2);
    }
    .sc-btn-buy:hover { background: rgba(255,215,0,0.25); }
    .sc-btn-active { background: rgba(34,197,94,0.15); color: #4ade80; cursor: default; }

    .shop-save-bar {
      text-align: center;
      margin-top: 1.5rem;
      padding-top: 1rem;
      border-top: 1px solid var(--border);
    }
  </style>

  <script>
    const USER_ID = "{{ user.id }}";
    const BGS = {{ backgrounds | tojson }};
    const BORDERS = {{ borders | tojson }};

    let profile = {};
    let activeBg = "default";
    let activeBorder = "default";

    function fmt(n) {
      if (n >= 1e18) return (n/1e18).toFixed(1)+'Qi';
      if (n >= 1e15) return (n/1e15).toFixed(1)+'Q';
      if (n >= 1e12) return (n/1e12).toFixed(1)+'T';
      if (n >= 1e9) return (n/1e9).toFixed(1)+'B';
      if (n >= 1e6) return (n/1e6).toFixed(1)+'M';
      if (n >= 1e3) return (n/1e3).toFixed(1)+'K';
      return n.toLocaleString('pt-BR');
    }

    function loadProfileImage() {
      const img = document.getElementById('pf-image');
      const loading = document.getElementById('pf-loading');
      const noImg = document.getElementById('pf-no-image');

      img.onload = function() {
        loading.style.display = 'none';
        noImg.style.display = 'none';
        img.style.display = 'block';
      };
      img.onerror = function() {
        loading.style.display = 'none';
        noImg.style.display = 'flex';
        img.style.display = 'none';
      };

      img.src = `/api/profile_image/${USER_ID}?t=${Date.now()}`;
    }

    function renderShop() {
      const ownedBg = profile.purchased_backgrounds || ["default"];
      const ownedBorder = profile.purchased_borders || ["default"];
      let bgOwned = 0, borderOwned = 0;

      const bgGrid = document.getElementById('bg-grid');
      bgGrid.innerHTML = '';
      for (const [key, bg] of Object.entries(BGS)) {
        const owned = ownedBg.includes(key);
        const active = key === activeBg;
        if (owned) bgOwned++;
        const card = document.createElement('div');
        card.className = `shop-card ${owned ? 'owned' : ''} ${active ? 'active' : ''}`;
        card.innerHTML = `
          <div class="sc-preview" style="background:${bg.colors.bg}">
            <div class="sc-accent" style="background:${bg.colors.accent}"></div>
          </div>
          <div class="sc-info">
            <span class="sc-emoji">${bg.emoji}</span>
            <span class="sc-name">${bg.name}</span>
            <span class="sc-price">${bg.price === 0 ? 'Gratis' : fmt(bg.price)+' K'}</span>
          </div>
          <div class="sc-actions">
            ${active ? '<button class="sc-btn sc-btn-active">Ativo</button>' :
              owned ? `<button class="sc-btn sc-btn-equip" onclick="equipBg('${key}')">Equipar</button>` :
              `<button class="sc-btn sc-btn-buy" onclick="buyItem('backgrounds','${key}',${bg.price})">Comprar</button>`
            }
          </div>`;
        bgGrid.appendChild(card);
      }
      document.getElementById('bg-count').textContent = `${bgOwned}/${Object.keys(BGS).length}`;

      const borderGrid = document.getElementById('border-grid');
      borderGrid.innerHTML = '';
      for (const [key, b] of Object.entries(BORDERS)) {
        const owned = ownedBorder.includes(key);
        const active = key === activeBorder;
        if (owned) borderOwned++;
        const card = document.createElement('div');
        card.className = `shop-card ${owned ? 'owned' : ''} ${active ? 'active' : ''}`;
        card.innerHTML = `
          <div class="sc-preview" style="background:#0a0a14">
            <div class="sc-border-circle" style="border-color:${b.color}"></div>
          </div>
          <div class="sc-info">
            <span class="sc-emoji">${b.emoji}</span>
            <span class="sc-name">${b.name}</span>
            <span class="sc-price">${b.price === 0 ? 'Gratis' : fmt(b.price)+' K'}</span>
          </div>
          <div class="sc-actions">
            ${active ? '<button class="sc-btn sc-btn-active">Ativo</button>' :
              owned ? `<button class="sc-btn sc-btn-equip" onclick="equipBorder('${key}')">Equipar</button>` :
              `<button class="sc-btn sc-btn-buy" onclick="buyItem('borders','${key}',${b.price})">Comprar</button>`
            }
          </div>`;
        borderGrid.appendChild(card);
      }
      document.getElementById('border-count').textContent = `${borderOwned}/${Object.keys(BORDERS).length}`;
    }

    function equipBg(key) {
      activeBg = key;
      renderShop();
      showToast('Fundo selecionado');
    }

    function equipBorder(key) {
      activeBorder = key;
      renderShop();
      showToast('Borda selecionada');
    }

    async function buyItem(type, key, price) {
      if (!confirm(`Comprar por ${fmt(price)} koins?`)) return;
      try {
        const r = await fetch('/api/profile_buy', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({ user_id: USER_ID, type, key }),
        });
        const data = await r.json();
        if (data.ok) {
          profile.koins = data.new_koins;
          if (type === 'backgrounds') {
            profile.purchased_backgrounds = profile.purchased_backgrounds || [];
            profile.purchased_backgrounds.push(key);
            activeBg = key;
          } else {
            profile.purchased_borders = profile.purchased_borders || [];
            profile.purchased_borders.push(key);
            activeBorder = key;
          }
          document.getElementById('koins-badge').textContent = fmt(profile.koins) + ' Koins';
          renderShop();
          showAlert('Comprou com sucesso!', 'success');
        } else {
          showAlert(data.error || 'Erro ao comprar', 'error');
        }
      } catch (e) {
        showAlert('Erro de conexao', 'error');
      }
    }

    async function saveAll() {
      const btn = document.getElementById('save-btn');
      btn.disabled = true; btn.textContent = 'Salvando...';
      try {
        await fetch(`/api/profile_config/${USER_ID}/set`, {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({ background: activeBg, border: activeBorder }),
        });
        showAlert('Perfil salvo!', 'success');
      } catch (e) {
        showAlert('Erro ao salvar', 'error');
      }
      btn.disabled = false; btn.textContent = 'Salvar Alteracoes';
    }

    function showAlert(msg, type) {
      const box = document.getElementById('alert-box');
      const d = document.createElement('div');
      d.className = `alert alert-${type}`; d.textContent = msg;
      box.appendChild(d); setTimeout(() => d.remove(), 3000);
    }
    function showToast(msg) {
      const box = document.getElementById('alert-box');
      const d = document.createElement('div');
      d.className = 'alert alert-success'; d.textContent = msg;
      box.appendChild(d); setTimeout(() => d.remove(), 2000);
    }

    // Load data
    fetch(`/api/profile_config/${USER_ID}`).then(r => r.json()).then(data => {
      profile = data;
      activeBg = data.background || 'default';
      activeBorder = data.border || 'default';
      document.getElementById('koins-badge').textContent = fmt(data.koins) + ' Koins';
      renderShop();
      loadProfileImage();
    });
  </script>
</body>
</html>
